services:
  - type: web
    name: election-chatbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this manually in the dashboard for security
      - key: PYTHON_VERSION
        value: 3.11.0
